<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر الزبون التجريبي</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; max-width: 350px; width: 100%; }
        button { background-color: #28a745; color: white; border: none; padding: 12px 25px; font-size: 16px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 15px; transition: 0.3s; }
        button:hover { background-color: #218838; }
        .status { margin-top: 15px; color: #666; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <h2>📱 متجر الزبون التجريبي</h2>
    <p>اضغط على الزر أدناه لمحاكاة إرسال طلب جديد للمتجر.</p>
    <button id="orderBtn">🛒 إرسال طلب شراء</button>
    <div id="status" class="status"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore.js";

    // إعدادات قاعدة بياناتك
    const firebaseConfig = {
        apiKey: "AIzaSyAInpnhNQp_WBlEAMGoUJe9XdLO1QarMeU",
        authDomain: "jhhj-4a7ea.firebaseapp.com",
        projectId: "jhhj-4a7ea",
        storageBucket: "jhhj-4a7ea.firebasestorage.app",
        messagingSenderId: "73387206086",
        appId: "1:73387206086:web:199df198b21c6cbc94bec7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 🔑 مفاتيح OneSignal (تم وضعها لك بنجاح)
    const ONESIGNAL_APP_ID = "cf84a72b-50f1-48eb-809a-688cc1e63599"; 
    const ONESIGNAL_REST_API_KEY = "os_v2_app_z6ckok2q6feoxae2ncgmdzrvtg4mxam4w3iu2h5ujxujrrvtjkipfnqhqariefmdm2r6jlnb6jcxqp6qio3rkdemh4bl5pxsbw4jfka";
    
    // 📱 رمز جهازك الذي سيستقبل الإشعارات (استخرجه من شاشة الأدمن وضعه هنا)
    const ADMIN_PLAYER_ID = "ضع_هنا_رمز_جهازك_الذي_ظهر_في_لوحة_الادمن";

    document.getElementById('orderBtn').addEventListener('click', async () => {
        const statusDiv = document.getElementById('status');
        statusDiv.innerText = "جاري إرسال الطلب وحفظه في قاعدة البيانات...";

        try {
            // 1. حفظ الطلب في فايربيس
            await addDoc(collection(db, "orders"), {
                productName: "منتج تجريبي",
                price: "25,000 د.ع",
                timestamp: serverTimestamp()
            });

            statusDiv.innerText = "تم حفظ الطلب! جاري إرسال الإشعار الفوري...";

            // 2. إرسال الإشعار لهاتفك عبر OneSignal
            const response = await fetch("https://onesignal.com/api/v1/notifications", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Basic ${ONESIGNAL_REST_API_KEY}`
                },
                body: JSON.stringify({
                    app_id: ONESIGNAL_APP_ID,
                    include_player_ids: [ADMIN_PLAYER_ID],
                    headings: { "en": "🛍️ طلب جديد للمتجر!", "ar": "🛍️ طلب جديد للمتجر!" },
                    contents: { "en": "أبو أمير، وصلك طلب شراء تجريبي جديد الآن!", "ar": "أبو أمير، وصلك طلب شراء تجريبي جديد الآن!" }
                })
            });

            if (response.ok) {
                statusDiv.innerHTML = "<b style='color:green;'>✅ تم إرسال الطلب ووصلك الإشعار بنجاح!</b>";
            } else {
                statusDiv.innerHTML = "<b style='color:orange;'>⚠️ تم حفظ الطلب، لكن فشل الإشعار. تأكد من وضع رمز جهازك (Player ID) بشكل صحيح.</b>";
            }

        } catch (error) {
            console.error(error);
            statusDiv.innerHTML = "<b style='color:red;'>❌ حدث خطأ أثناء العملية.</b>";
        }
    });
</script>
</body>
</html>
