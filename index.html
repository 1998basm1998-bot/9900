<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر الزبون التجريبي</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; max-width: 350px; width: 100%; }
        button { background-color: #28a745; color: white; border: none; padding: 12px 25px; font-size: 16px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 15px; transition: 0.3s; }
        button:hover { background-color: #218838; }
        .status { margin-top: 15px; color: #666; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <h2>📱 متجر الزبون التجريبي</h2>
    <p>اضغط على الزر أدناه لمحاكاة إرسال طلب جديد للمتجر.</p>
    <button id="orderBtn">🛒 إرسال طلب شراء</button>
    <div id="status" class="status"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore.js";

    // إعدادات فايربيس الخاصة بك
    const firebaseConfig = {
        apiKey: "AIzaSyAInpnhNQp_WBlEAMGoUJe9XdLO1QarMeU",
        authDomain: "jhhj-4a7ea.firebaseapp.com",
        projectId: "jhhj-4a7ea",
        storageBucket: "jhhj-4a7ea.firebasestorage.app",
        messagingSenderId: "73387206086",
        appId: "1:73387206086:web:199df198b21c6cbc94bec7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // مفاتيح Pushy (استبدل القيم بالبيانات الخاصة بك)
    const PUSHY_SECRET_API_KEY = "535840e244ec710ee3367cf08bfa5f166a67818a35cd9bf13f554cd2cf38ae8f"; 
    const ADMIN_DEVICE_TOKEN = "ضع_هنا_التوكن_الذي_سيظهر_في_شاشة_الأدمن"; 

    document.getElementById('orderBtn').addEventListener('click', async () => {
        const statusDiv = document.getElementById('status');
        statusDiv.innerText = "جاري إرسال الطلب وحفظه في قاعدة البيانات...";

        try {
            // 1. حفظ الطلب في Firestore
            await addDoc(collection(db, "orders"), {
                productName: "منتج تجريبي",
                price: "25,000 د.ع",
                timestamp: serverTimestamp()
            });

            statusDiv.innerText = "تم حفظ الطلب في فايربيس بنجاح! جاري إرسال الإشعار...";

            // 2. إرسال الإشعار الفوري لهاتف الأدمن عبر Pushy API
            const response = await fetch(`https://api.pushy.me/push?api_key=${PUSHY_SECRET_API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    to: ADMIN_DEVICE_TOKEN,
                    notification: {
                        title: "🛍️ طلب جديد للمتجر!",
                        body: "أبو أمير، وصلك طلب شراء تجريبي جديد الآن، يرجى مراجعته."
                    }
                })
            });

            if (response.ok) {
                statusDiv.innerHTML = "<b style='color:green;'>✅ تم إرسال الطلب ووصل الإشعار للأدمن بنجاح!</b>";
            } else {
                statusDiv.innerHTML = "<b style='color:orange;'>⚠️ تم حفظ الطلب، لكن فشل إرسال الإشعار. تأكد من التوكن.</b>";
            }

        } catch (error) {
            console.error(error);
            statusDiv.innerHTML = "<b style='color:red;'>❌ حدث خطأ أثناء العملية.</b>";
        }
    });
</script>
</body>
</html>
